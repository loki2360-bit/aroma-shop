<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Задачи • Lite</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    :root {
      --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b;
      --primary: #2563eb; --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
      --border: #e2e8f0; --radius: 12px; --shadow: 0 2px 10px rgba(0,0,0,0.06);
      --font: system-ui, -apple-system, sans-serif;
    }
    [data-theme="dark"] {
      --bg: #0b1120; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
      --border: #334155; --shadow: 0 2px 10px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.5; padding-bottom: 80px; }
    
    header { position: sticky; top: 0; z-index: 50; background: var(--card); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .brand { font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
    .brand span { font-size: 0.7rem; background: var(--primary); color: #fff; padding: 2px 6px; border-radius: 6px; }
    .actions { display: flex; gap: 6px; align-items: center; }
    .storage-badge { font-size: 0.65rem; background: #e0f2fe; color: #0369a1; padding: 2px 6px; border-radius: 8px; white-space: nowrap; }
    
    .btn { padding: 8px 12px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; min-height: 36px; transition: transform 0.1s; }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 6px 10px; font-size: 0.85rem; min-height: 32px; }
    
    .search-bar { padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .search-bar input, .search-bar select { flex: 1; min-width: 120px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: var(--bg); color: var(--text); }
    .status-toggle { display: flex; gap: 4px; }
    .status-btn { padding: 6px 8px; border: 1px solid var(--border); background: transparent; border-radius: 6px; font-size: 0.8rem; cursor: pointer; color: var(--muted); }
    .status-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    
    .task-list { list-style: none; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .swipe-wrap { position: relative; overflow: hidden; border-radius: var(--radius); touch-action: pan-y; }
    
    /* Компактная карточка */
    .swipe-content { 
      background: var(--card); 
      padding: 12px 14px; 
      box-shadow: var(--shadow); 
      cursor: pointer; 
      border-left: 4px solid var(--primary); 
      transition: transform 0.2s, background 0.15s; 
      position: relative; 
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 48px;
    }
    .swipe-content.completed { opacity: 0.6; border-left-color: var(--muted); }
    .swipe-content.completed h3 { text-decoration: line-through; color: var(--muted); }
    .swipe-content:active { background: rgba(37,99,235,0.08); }
    
    .task-title-wrap { 
      flex: 1; 
      min-width: 0; 
      display: flex; 
      align-items: center; 
      gap: 8px;
      overflow: hidden;
    }
    .task-card h3 { 
      font-size: 0.95rem; 
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin: 0;
    }
    .task-indicators {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .indicator {
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 600;
      white-space: nowrap;
    }
    .indicator.pin { background: var(--warning); color: #fff; }
    .indicator.due { background: #fee2e2; color: #991b1b; }
    .indicator.today { background: #dcfce7; color: #166534; }
    .indicator.file { background: #e0f2fe; color: #075985; }
    
    .swipe-actions { position: absolute; right: 0; top: 0; bottom: 0; display: flex; z-index: 1; }
    .swipe-btn { width: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-size: 0.75rem; gap: 4px; }
    .swipe-btn.complete { background: var(--success); }
    .swipe-btn.delete { background: var(--danger); }
    .swipe-btn.pin { background: var(--warning); }
    
    /* Детали задачи */
    #detailView { display: none; padding: 16px; }
    #detailView.active { display: block; }
    .detail-card { background: var(--card); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
    .detail-card h1 { font-size: 1.3rem; margin-bottom: 12px; line-height: 1.3; }
    .detail-meta { 
      display: flex; 
      gap: 16px; 
      flex-wrap: wrap; 
      margin-bottom: 16px; 
      padding-bottom: 16px; 
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--muted);
    }
    .detail-meta div { display: flex; align-items: center; gap: 4px; }
    .detail-card .desc { 
      font-size: 1rem; 
      margin: 16px 0; 
      line-height: 1.6; 
      white-space: pre-wrap;
      color: var(--text);
    }
    .detail-card .tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
    .tag { font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; color: #fff; font-weight: 600; }
    
    .file-gallery { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
      gap: 10px; 
      margin: 16px 0; 
    }
    .file-item-img {
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid var(--border);
      transition: transform 0.2s;
    }
    .file-item-img:hover { transform: scale(1.05); }
    .file-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .file-item-name {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .detail-actions { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
    .detail-actions button { flex: 1; min-width: 120px; }
    
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty svg { width: 60px; height: 60px; margin-bottom: 12px; opacity: 0.6; }
    .loading { text-align: center; padding: 20px; color: var(--muted); }
    
    #installPrompt { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--card); padding: 10px 16px; border-radius: 10px; box-shadow: var(--shadow); display: none; align-items: center; gap: 8px; z-index: 60; border: 1px solid var(--border); font-size: 0.9rem; }
    #installPrompt.show { display: flex; }
    .hidden { display: none !important; }
    .pin-icon { color: var(--warning); }
    [data-theme="dark"] input,[data-theme="dark"] textarea,[data-theme="dark"] select { background: #0f172a; border-color: #475569; }
    @media(max-width: 480px) { .search-bar { flex-direction: column; } .search-bar input, .search-bar select { width: 100%; } }
    
    #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 0.9rem; opacity: 0; transition: all 0.3s; z-index: 200; pointer-events: none; max-width: 90%; text-align: center; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--danger); }
    
    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: none; justify-content: center; align-items: flex-end; z-index: 100; }
    .modal.active { display: flex; }
    @media(min-width: 640px) { .modal { align-items: center; } }
    .modal-box { background: var(--card); width: 100%; max-width: 480px; max-height: 90vh; border-radius: 16px 16px 0 0; overflow-y: auto; padding: 16px; }
    @media(min-width: 640px) { .modal-box { border-radius: 14px; } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; }
    .close { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: var(--muted); }
    
    .form-grid { display: flex; flex-direction: column; gap: 12px; }
    .fg label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 4px; }
    .fg input, .fg textarea, .fg select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; background: var(--bg); color: var(--text); }
    .fg textarea { min-height: 80px; resize: vertical; }
    .tags-input { display: flex; gap: 6px; flex-wrap: wrap; }
    .tags-input input, .tags-input select { flex: 1; min-width: 100px; }
    
    .tag-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    .tag-chip button { background: none; border: none; color: inherit; padding: 0; margin-left: 2px; cursor: pointer; font-size: 1rem; line-height: 1; }
    .color-palette { display: flex; gap: 6px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
    .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
    .color-dot:hover { transform: scale(1.2); }
    .color-dot.selected { border-color: var(--text); transform: scale(1.2); }
    
    .file-list { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
    .file-preview { 
      position: relative; 
      width: 80px; 
      height: 80px; 
      border-radius: 8px; 
      overflow: hidden; 
      border: 2px solid var(--border);
    }
    .file-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .file-preview button {
      position: absolute;
      top: 2px;
      right: 2px;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--primary); color: #fff; border: none; border-radius: 50%; font-size: 28px; box-shadow: 0 4px 14px rgba(37,99,235,0.4); cursor: pointer; z-index: 40; }
    .fab:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div id="listView">
    <header>
      <div class="brand">Задачи <span>Lite</span></div>
      <div class="actions">
        <span class="storage-badge" id="storageBadge">💾 0%</span>
        <button class="btn btn-outline btn-sm" onclick="toggleTheme()" title="Тема">🌓</button>
        <button class="btn btn-outline btn-sm" onclick="exportData()" title="Экспорт">📥</button>
        <label class="btn btn-outline btn-sm" title="Импорт" style="cursor:pointer">📤<input type="file" accept=".json" onchange="importData(this)" style="display:none"></label>
      </div>
    </header>
    
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Поиск..." oninput="renderList()">
      <input type="date" id="searchDate" onchange="renderList()">
      <button class="btn btn-outline btn-sm" onclick="clearDateFilter()">✕ Дата</button>
      <div class="status-toggle">
        <button class="status-btn active" onclick="setStatusFilter('all')">Все</button>
        <button class="status-btn" onclick="setStatusFilter('active')">Активные</button>
        <button class="status-btn" onclick="setStatusFilter('completed')">✅</button>
      </div>
    </div>
    
    <div id="loadingState" class="loading">⏳ Загрузка данных...</div>
    <ul id="taskList" class="task-list hidden"></ul>
    <div id="emptyState" class="empty hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <p>Нет задач. Создайте первую!</p>
    </div>
    <button class="fab hidden" id="addBtn" onclick="openModal()">+</button>
  </div>
  
  <div id="detailView">
    <button class="btn btn-outline btn-sm" onclick="showList()" style="margin-bottom: 12px">← Назад</button>
    <div id="detailContent" class="detail-card"></div>
  </div>
  
  <div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-header"><h2 id="modalTitle">Новая задача</h2><button class="close" onclick="closeModal()">&times;</button></div>
      <form id="taskForm" class="form-grid">
        <input type="hidden" id="editId">
        <div class="fg"><label>Заголовок *</label><input type="text" id="inputTitle" required placeholder="Например: Купить продукты"></div>
        <div class="fg"><label>Описание</label><textarea id="inputText" placeholder="Детали, заметки..."></textarea></div>
        <div class="fg"><label>Срок выполнения</label><input type="datetime-local" id="inputDue" step="60"><small style="color:var(--muted);font-size:0.7rem">Напоминание за 15 мин</small></div>
        <div class="fg">
          <label>Фото (только изображения, макс. 5/день)</label>
          <input type="file" id="inputFiles" multiple accept="image/*">
          <small id="fileLimitInfo" style="color:var(--muted);font-size:0.7rem"></small>
          <div id="previewFiles" class="file-list"></div>
        </div>
        
        <div class="fg">
          <label>Теги (выберите цвет)</label>
          <div class="color-palette" id="colorPalette"></div>
          <div class="tags-input" style="margin-top:6px">
            <select id="inputTagSelect" onchange="addTagFromSelect()">
              <option value="">+ Добавить стандартный</option>
              <option value="срочно">🔴 Срочно</option>
              <option value="важно">🟡 Важно</option>
              <option value="личное">🟣 Личное</option>
              <option value="работа">🔵 Работа</option>
              <option value="идея">🟢 Идея</option>
              <option value="покупки">🩷 Покупки</option>
            </select>
            <input type="text" id="inputTagCustom" placeholder="Свой тег..." onkeypress="if(event.key==='Enter'){addCustomTag();return false}">
          </div>
          <div id="selectedTags" class="tags" style="margin-top: 8px"></div>
        </div>

        <div class="fg"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="inputPin" style="width:18px;height:18px"><span>📌 Закрепить (макс. 5)</span></label></div>
        <div class="fg"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="inputNotify" style="width:18px;height:18px" checked><span>🔔 Уведомление</span></label></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px"><button type="button" class="btn btn-outline" onclick="closeModal()">Отмена</button><button type="submit" class="btn btn-primary">💾 Сохранить</button></div>
      </form>
    </div>
  </div>

  <div id="installPrompt"><span>📱 Установить?</span><button class="btn btn-primary btn-sm" onclick="installPWA()">Установить</button><button class="btn btn-outline btn-sm" onclick="this.parentElement.classList.remove('show')">✕</button></div>
  <div id="toast"></div>

  <script>
    // === IndexedDB Engine ===
    const DB_NAME = 'TaskManager_v4', DB_VER = 1;
    let idb;
    const IDB = {
      async init() {
        return new Promise((res, rej) => {
          const req = indexedDB.open(DB_NAME, DB_VER);
          req.onupgradeneeded = e => { const db = e.target.result; if(!db.objectStoreNames.contains('tasks')) db.createObjectStore('tasks', {keyPath:'id'}); };
          req.onsuccess = e => { idb = e.target.result; res(); };
          req.onerror = e => rej(e.target.error);
        });
      },
      async getAll() { return new Promise((res,rej)=>{const tx=idb.transaction('tasks','readonly'); tx.objectStore('tasks').getAll().onsuccess=e=>res(e.target.result); tx.onerror=e=>rej(e.target.error);}); },
      async put(task) { return new Promise((res,rej)=>{const tx=idb.transaction('tasks','readwrite'); tx.objectStore('tasks').put(task); tx.oncomplete=()=>res(); tx.onerror=e=>rej(e.target.error);}); },
      async delete(id) { return new Promise((res,rej)=>{const tx=idb.transaction('tasks','readwrite'); tx.objectStore('tasks').delete(id); tx.oncomplete=()=>res(); tx.onerror=e=>rej(e.target.error);}); },
      async clear() { return new Promise((res,rej)=>{const tx=idb.transaction('tasks','readwrite'); tx.objectStore('tasks').clear(); tx.oncomplete=()=>res(); tx.onerror=e=>rej(e.target.error);}); }
    };

    // === State ===
    let tasks = [], fileLog = { date: '', count: 0 }, editingId = null;
    let currentTags = []; 
    let currentFiles = [], statusFilter = 'all';
    let selectedColor = '#3b82f6'; 

    const PALETTE = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#6366f1', '#64748b'];
    const TAG_PRESETS = {
      'срочно': '#ef4444', 'важно': '#f59e0b', 'личное': '#8b5cf6',
      'работа': '#3b82f6', 'идея': '#10b981', 'покупки': '#ec4899'
    };

    const $ = id => document.getElementById(id);
    const uid = () => crypto?.randomUUID?.() || Date.now().toString(36)+Math.random().toString(36).slice(2);
    const esc = s => (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

    // === Init ===
    async function init() {
      try {
        renderColorPalette();
        await IDB.init();
        
        const old = localStorage.getItem('tasks_v3');
        if (old) {
          try {
            const oldTasks = JSON.parse(old);
            for (const t of oldTasks) {
              if (t.files) t.files = t.files.map(f => ({ name: f.name, size: f.size, type: f.type, blob: dataURLtoBlob(f.data) }));
              if (t.tags && typeof t.tags[0] === 'string') {
                t.tags = t.tags.map(tagName => ({ name: tagName, color: TAG_PRESETS[tagName] || getRandomColor() }));
              }
              await IDB.put(t);
            }
            localStorage.removeItem('tasks_v3');
            showToast('🔄 Данные мигрированы');
          } catch(e) { console.warn('Migration failed', e); }
        }
        
        tasks = await IDB.getAll();
        const fl = JSON.parse(localStorage.getItem('file_log') || '{}');
        fileLog = fl.date === new Date().toISOString().slice(0,10) ? fl : { date: new Date().toISOString().slice(0,10), count: 0 };
        
        if(localStorage.getItem('theme')==='dark') document.documentElement.dataset.theme='dark';
        
        renderList();
        updateStorageBadge();
        checkDueTasks();
        setInterval(checkDueTasks, 5*60*1000);
        
        $('addBtn').onclick = () => openModal();
        $('taskForm').onsubmit = saveTask;
        $('inputFiles').onchange = handleFileSelect;
        document.onkeydown = e => { if(e.key==='Escape'){closeModal();showList();} };
        document.body.addEventListener('click', async () => { if(Notification?.permission==='default') await Notification.requestPermission(); }, {once:true});
        
      } catch(e) {
        console.error('Init Error:', e);
        showToast('Ошибка загрузки', true);
      } finally {
        $('loadingState').classList.add('hidden');
        $('taskList').classList.remove('hidden');
        $('addBtn').classList.remove('hidden');
      }
    }

    function dataURLtoBlob(dataurl) {
      const arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1], bstr = atob(arr[1]);
      let n = bstr.length, u8arr = new Uint8Array(n);
      while(n--) u8arr[n] = bstr.charCodeAt(n);
      return new Blob([u8arr], {type:mime});
    }
    
    function getRandomColor() { return PALETTE[Math.floor(Math.random() * PALETTE.length)]; }

    function renderColorPalette() {
      $('colorPalette').innerHTML = PALETTE.map(c => 
        `<div class="color-dot ${c===selectedColor?'selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
      ).join('') + `<input type="color" id="customColorInput" value="${selectedColor}" style="width:24px;height:24px;border:none;background:none;cursor:pointer" onchange="selectColor(this.value)">`;
    }
    window.selectColor = c => {
      selectedColor = c;
      document.querySelectorAll('.color-dot').forEach(d => d.classList.toggle('selected', d.style.backgroundColor === c || rgbToHex(d.style.backgroundColor) === c));
      if($('customColorInput')) $('customColorInput').value = c;
    }
    function rgbToHex(rgb) { 
      if(!rgb || rgb.startsWith('#')) return rgb;
      const match = rgb.match(/\d+/g);
      if(!match) return rgb;
      return '#' + match.slice(0,3).map(x => parseInt(x).toString(16).padStart(2,'0')).join('');
    }

    // === File Handling (только изображения) ===
    function handleFileSelect(e) {
      const files = Array.from(e.target.files);
      const limit = 5 - fileLog.count;
      if(limit <= 0) { showToast('❌ Лимит файлов на день исчерпан', true); e.target.value=''; return; }
      
      currentFiles = [];
      let loaded = 0;
      files.slice(0, limit).forEach(f => {
        // Проверка: только изображения
        if(!f.type.startsWith('image/')) {
          showToast(`❌ ${f.name} — не изображение`, true);
          return;
        }
        if(f.size > 5*1024*1024) { showToast(`❌ ${f.name} > 5 МБ`, true); return; }
        currentFiles.push({ name: f.name, size: f.size, type: f.type, blob: f });
        loaded++;
      });
      $('fileLimitInfo').textContent = `Загружено: ${loaded}/${limit} (только изображения)`;
      updateFilePreview();
    }
    
    function updateFilePreview() { 
      $('previewFiles').innerHTML = currentFiles.map((f,i)=>`
        <div class="file-preview">
          <img src="${URL.createObjectURL(f.blob)}" alt="${esc(f.name)}">
          <button type="button" onclick="removeFile(${i})">×</button>
        </div>
      `).join(''); 
    }
    window.removeFile = i => { currentFiles.splice(i,1); updateFilePreview(); };

    // === Render List (компактный) ===
    function renderList() {
      const q = $('searchInput').value.toLowerCase();
      const d = $('searchDate').value;
      const tFilter = $('searchTag')?.value || '';
      const now = new Date();
      
      let list = tasks.filter(task => {
        const mq = !q || task.title.toLowerCase().includes(q) || (task.text||'').toLowerCase().includes(q);
        const md = !d || (task.dueDate && new Date(task.dueDate).toISOString().startsWith(d));
        const mt = !tFilter || task.tags.some(tag => tag.name === tFilter);
        const ms = statusFilter==='all' || (statusFilter==='active' && !task.completed) || (statusFilter==='completed' && task.completed);
        return mq && md && mt && ms;
      });

      list.sort((a,b) => {
        if(a.pinned && !b.pinned) return -1; if(!a.pinned && b.pinned) return 1;
        if(a.completed !== b.completed) return a.completed ? 1 : -1;
        return (b.dueDate ? new Date(b.dueDate).getTime() : Infinity) - (a.dueDate ? new Date(a.dueDate).getTime() : Infinity);
      });

      const ul = $('taskList'), empty = $('emptyState');
      ul.innerHTML = '';
      if(!list.length) { empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      list.forEach(task => {
        const wrap = document.createElement('div');
        wrap.className = 'swipe-wrap';
        
        const isOverdue = task.dueDate && new Date(task.dueDate) < now && !task.completed;
        const isToday = task.dueDate && new Date(task.dueDate).toDateString() === now.toDateString() && !task.completed;
        
        wrap.innerHTML = `
          <div class="swipe-content ${task.completed?'completed':''}">
            <div class="task-title-wrap">
              ${task.pinned?'<span class="pin-icon">📌</span>':''}
              <h3>${esc(task.title)}</h3>
            </div>
            <div class="task-indicators">
              ${task.files?.length?`<span class="indicator file">📷 ${task.files.length}</span>`:''}
              ${isOverdue?`<span class="indicator due">Просрочено</span>`:''}
              ${isToday?`<span class="indicator today">Сегодня</span>`:''}
            </div>
          </div>
          <div class="swipe-actions">
            <div class="swipe-btn complete" onclick="toggleComplete('${task.id}')">${task.completed?'↩️':'✅'}</div>
            <div class="swipe-btn delete" onclick="deleteTask('${task.id}')">🗑️</div>
          </div>
        `;
        initSwipe(wrap);
        wrap.querySelector('.swipe-content').onclick = e => { if(!wrap.dataset.swiped) openDetail(task.id); };
        ul.appendChild(wrap);
      });
    }
    
    window.setStatusFilter = s => { statusFilter=s; document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('active')); document.querySelector(`.status-btn:nth-child(${s==='all'?1:s==='active'?2:3})`).classList.add('active'); renderList(); };
    window.clearDateFilter = () => { $('searchDate').value=''; renderList(); };

    function initSwipe(el) {
      let startX, startY, currentX, isOpen = false;
      const content = el.querySelector('.swipe-content');
      const max = 120;
      const start = e => { startX = e.touches ? e.touches[0].clientX : e.clientX; startY = e.touches ? e.touches[0].clientY : e.clientY; el.dataset.swiped='0'; };
      const move = e => {
        if(!startX) return;
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        if(Math.abs(x-startX) < Math.abs(y-startY)) return;
        currentX = Math.max(0, Math.min(max, startX - x));
        if(currentX > 0) content.style.transform = `translateX(-${currentX}px)`;
      };
      const end = () => {
        if(currentX > max/2) { content.style.transform = `translateX(-${max}px)`; isOpen = true; el.dataset.swiped='1'; }
        else { content.style.transform = ''; isOpen = false; }
        startX = currentX = 0;
        setTimeout(()=> delete el.dataset.swiped, 500);
      };
      el.addEventListener('touchstart', start, {passive:true}); el.addEventListener('touchmove', move, {passive:true}); el.addEventListener('touchend', end);
      el.addEventListener('mousedown', start); el.addEventListener('mousemove', move); el.addEventListener('mouseup', end); el.addEventListener('mouseleave', end);
    }

    window.toggleComplete = async id => { const t=tasks.find(x=>x.id===id); if(!t)return; t.completed=!t.completed; t.completedAt=t.completed?Date.now():null; await IDB.put(t); renderList(); showToast(t.completed?'✅ Выполнено':'↩️ Возвращено'); };
    window.togglePin = async id => { const t=tasks.find(x=>x.id===id); if(!t)return; if(!t.pinned && tasks.filter(x=>x.pinned).length>=5) return showToast('❌ Макс. 5 закреплённых',true); t.pinned=!t.pinned; await IDB.put(t); renderList(); };
    window.deleteTask = async id => { if(!confirm('Удалить задачу?'))return; tasks=tasks.filter(x=>x.id!==id); await IDB.delete(id); renderList(); updateStorageBadge(); showToast('🗑️ Удалено'); };
    
    function openDetail(id) {
      const t=tasks.find(x=>x.id===id); if(!t)return;
      const tagsHtml = (t.tags||[]).map(tag=>`<span class="tag" style="background-color:${tag.color}">${esc(tag.name)}</span>`).join('');
      const dueStr = t.dueDate ? new Date(t.dueDate).toLocaleString('ru-RU') : 'Не указан';
      const isOverdue = t.dueDate && new Date(t.dueDate) < new Date() && !t.completed;
      
      let filesHtml = '';
      if(t.files?.length) {
        filesHtml = `<div style="margin:16px 0"><strong>Фотографии:</strong><div class="file-gallery">${t.files.map((f,i)=>{const u=URL.createObjectURL(f.blob);return`<div class="file-item-img" onclick="window.open('${u}','_blank')"><img src="${u}" alt="${esc(f.name)}"><div class="file-item-name">${esc(f.name)}</div></div>`}).join('')}</div></div>`;
      }
      
      $('detailContent').innerHTML = `
        <h1>${esc(t.title)} ${t.completed?'✅':''}</h1>
        <div class="detail-meta">
          <div>🕐 ${new Date(t.createdAt).toLocaleString('ru-RU')}</div>
          <div>📅 ${isOverdue?'<span style="color:var(--danger);font-weight:600">Просрочено:</span>':''}${dueStr}</div>
          ${t.completed?`<div>✅ Выполнено: ${new Date(t.completedAt).toLocaleString('ru-RU')}</div>`:''}
        </div>
        ${tagsHtml?`<div style="margin-bottom:12px">${tagsHtml}</div>`:''}
        ${t.text?`<div class="desc">${esc(t.text)}</div>`:'<div class="desc" style="color:var(--muted)">Без описания</div>'}
        ${filesHtml}
        <div class="detail-actions">
          <button class="btn ${t.completed?'btn-outline':'btn-primary'}" onclick="toggleComplete('${t.id}');openDetail('${t.id}');">${t.completed?'↩️ Возвратить':'✅ Выполнить'}</button>
          <button class="btn btn-outline" onclick="editTask('${t.id}')">✏️ Редактировать</button>
          <button class="btn btn-danger" onclick="deleteTask('${t.id}')">🗑️ Удалить</button>
        </div>
      `;
      $('listView').style.display='none'; $('detailView').classList.add('active');
    }
    window.showList = () => { $('listView').style.display='block'; $('detailView').classList.remove('active'); };
    window.editTask = id => { showList(); setTimeout(()=>openModal(id),100); };

    window.openModal = (id=null) => {
      editingId=id; $('taskForm').reset(); currentTags=[]; currentFiles=[]; selectedColor='#3b82f6'; 
      $('selectedTags').innerHTML=''; $('previewFiles').innerHTML='';
      renderColorPalette();
      
      if(id) {
        const t=tasks.find(x=>x.id===id); $('modalTitle').textContent='Редактирование';
        $('inputTitle').value=t.title; $('inputText').value=t.text||''; $('inputDue').value=t.dueDate?t.dueDate.slice(0,16):'';
        $('inputNotify').checked=t.notify!==false; currentTags=[...(t.tags||[])]; currentFiles=[...(t.files||[])]; $('inputPin').checked=t.pinned;
        renderSelectedTags(); updateFilePreview();
      } else {
        $('modalTitle').textContent='Новая задача';
        const p=tasks.filter(x=>x.pinned).length; $('inputPin').disabled=p>=5; $('inputPin').title=p>=5?'Макс. 5':'';
        const tm=new Date(); tm.setDate(tm.getDate()+1); tm.setHours(18,0); $('inputDue').value=tm.toISOString().slice(0,16);
        $('fileLimitInfo').textContent=`Доступно фото сегодня: ${Math.max(0,5-fileLog.count)}`;
      }
      $('modal').classList.add('active'); setTimeout(()=>$('inputTitle').focus(),100);
    };
    window.closeModal = () => { $('modal').classList.remove('active'); editingId=null; };
    
    window.addTagFromSelect = () => { 
      const name = $('inputTagSelect').value; 
      if(!name) return;
      if(!currentTags.some(t => t.name === name)) {
        const color = TAG_PRESETS[name] || selectedColor;
        currentTags.push({ name, color });
        renderSelectedTags();
      }
      $('inputTagSelect').value=''; 
    };
    
    window.addCustomTag = () => { 
      const name = $('inputTagCustom').value.trim().toLowerCase(); 
      if(!name || name.length > 20) return;
      if(!currentTags.some(t => t.name === name)) {
        currentTags.push({ name, color: selectedColor });
        renderSelectedTags();
        $('inputTagCustom').value='';
      }
    };
    
    window.removeTag = i => { currentTags.splice(i,1); renderSelectedTags(); };
    
    function renderSelectedTags() {
      $('selectedTags').innerHTML = currentTags.map((t,i) => 
        `<span class="tag-chip" style="background-color:${t.color}">${esc(t.name)} <button type="button" onclick="removeTag(${i})">×</button></span>`
      ).join('');
    }

    async function saveTask(e) {
      e.preventDefault();
      const title=$('inputTitle').value.trim(), text=$('inputText').value.trim(), due=$('inputDue').value?new Date($('inputDue').value).toISOString():null;
      const notify=$('inputNotify').checked, pin=$('inputPin').checked;
      if(pin&&!editingId && tasks.filter(t=>t.pinned).length>=5) return showToast('❌ Макс. 5 закреплённых',true);
      
      const now=Date.now();
      const task={id:editingId||uid(), title, text, dueDate:due, notify, tags:[...currentTags], pinned:pin, files:[...currentFiles], completed:false, createdAt:editingId?tasks.find(t=>t.id===editingId)?.createdAt||now:now, updatedAt:now};
      
      const idx = editingId ? tasks.findIndex(t=>t.id===editingId) : -1;
      if(idx>-1) tasks[idx]=task; else tasks.unshift(task);
      
      if(fileLog.count+currentFiles.filter(f=>!tasks.find(t=>t.id===task.id)?.files?.find(of=>of.name===f.name)).length <=5) {
        fileLog.count += currentFiles.length;
        localStorage.setItem('file_log', JSON.stringify(fileLog));
      }
      
      try {
        await IDB.put(task);
        closeModal(); renderList(); updateStorageBadge(); showToast('✅ Сохранено');
      } catch(err) { showToast('❌ Ошибка: '+err.message, true); }
    }

    window.toggleTheme = () => { const d=document.documentElement.dataset.theme==='dark'; document.documentElement.dataset.theme=d?'':'dark'; localStorage.setItem('theme',d?'light':'dark'); };
    
    async function exportData() {
      showToast('⏳ Подготовка экспорта...');
      try {
        const exportTasks = await Promise.all(tasks.map(async t => {
          const files = t.files ? await Promise.all(t.files.map(async f => ({ name: f.name, size: f.size, type: f.type, data: await blobToDataURL(f.blob) }))) : [];
          return { ...t, files };
        }));
        const b=new Blob([JSON.stringify({tasks:exportTasks,fileLog},null,2)],{type:'application/json'});
        const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`tasks_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
        showToast('📥 Экспорт готов');
      } catch(err) { showToast('❌ Ошибка экспорта', true); }
    }
    function blobToDataURL(blob) { return new Promise(res => { const r=new FileReader(); r.onload=()=>res(r.result); r.readAsDataURL(blob); }); }
    
    async function importData(inp) {
      const f=inp.files[0]; if(!f)return;
      const r=new FileReader(); r.onload=async e=>{
        try {
          const d=JSON.parse(e.target.result);
          if(d.tasks){
            await IDB.clear();
            tasks = d.tasks.map(t => ({
              ...t,
              tags: t.tags?.map(tag => typeof tag === 'string' ? {name: tag, color: TAG_PRESETS[tag]||getRandomColor()} : tag) || [],
              files: t.files?.map(f => ({ ...f, blob: dataURLtoBlob(f.data) })) || []
            }));
            fileLog=d.fileLog||{date:new Date().toISOString().slice(0,10),count:0};
            localStorage.setItem('file_log', JSON.stringify(fileLog));
            for(const t of tasks) await IDB.put(t);
            renderList(); updateStorageBadge(); showToast('✅ Импорт выполнен');
          }
        }catch(err){showToast('❌ Ошибка: '+err.message, true)}
        inp.value='';
      }; r.readAsText(f);
    }

    async function updateStorageBadge() {
      if(navigator.storage?.estimate) {
        const est = await navigator.storage.estimate();
        const used = est.usage || 0;
        const quota = est.quota || 0;
        $('storageBadge').textContent = `💾 ${formatBytes(used)}`;
      }
    }
    function formatBytes(bytes) { if(!bytes) return '0 B'; const k=1024, s=['B','KB','MB','GB']; const i=Math.floor(Math.log(bytes)/Math.log(k)); return parseFloat((bytes/Math.pow(k,i)).toFixed(1))+' '+s[i]; }

    function checkDueTasks(){
      const now=Date.now();
      tasks.forEach(t=>{
        if(!t.dueDate||t.completed||t.notified)return;
        const due=new Date(t.dueDate).getTime();
        if(due<now&&t.notify){ showToast('❗ Просрочено: '+t.title); t.notified=true; }
        else if(due-now<=15*60000&&!t.reminded&&t.notify){ showToast('⏰ Скоро: '+t.title); t.reminded=true; }
      });
      tasks.forEach(t => { if(t.notified || t.reminded) IDB.put(t); });
    }

    if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
    let deferredPrompt; window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; $('installPrompt').classList.add('show'); });
    async function installPWA() { if(!deferredPrompt)return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; $('installPrompt').classList.remove('show'); showToast('✅ Установлено'); }

    init();
  </script>
</body>
</html>
