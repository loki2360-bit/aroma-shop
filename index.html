<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Задачи • Lite</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    :root {
      --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b;
      --primary: #2563eb; --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
      --border: #e2e8f0; --radius: 12px; --shadow: 0 2px 10px rgba(0,0,0,0.06);
      --font: system-ui, -apple-system, sans-serif;
    }
    [data-theme="dark"] {
      --bg: #0b1120; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
      --border: #334155; --shadow: 0 2px 10px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.5; padding-bottom: 80px; }
    
    header { position: sticky; top: 0; z-index: 50; background: var(--card); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .brand { font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
    .brand span { font-size: 0.7rem; background: var(--primary); color: #fff; padding: 2px 6px; border-radius: 6px; }
    .actions { display: flex; gap: 6px; }
    
    .btn { padding: 8px 12px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; min-height: 36px; transition: transform 0.1s; }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 6px 10px; font-size: 0.85rem; min-height: 32px; }
    
    .search-bar { padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .search-bar input, .search-bar select { flex: 1; min-width: 120px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: var(--bg); color: var(--text); }
    .status-toggle { display: flex; gap: 4px; }
    .status-btn { padding: 6px 8px; border: 1px solid var(--border); background: transparent; border-radius: 6px; font-size: 0.8rem; cursor: pointer; color: var(--muted); }
    .status-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    
    .task-list { list-style: none; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    
    /* Swipe Container */
    .swipe-wrap { position: relative; overflow: hidden; border-radius: var(--radius); touch-action: pan-y; }
    .swipe-content { background: var(--card); padding: 14px; box-shadow: var(--shadow); cursor: pointer; border-left: 4px solid var(--primary); transition: transform 0.2s, background 0.15s; position: relative; z-index: 2; }
    .swipe-content.completed { opacity: 0.65; border-left-color: var(--muted); }
    .swipe-content.completed h3 { text-decoration: line-through; }
    .swipe-content:active { background: rgba(37,99,235,0.06); }
    
    .swipe-actions { position: absolute; right: 0; top: 0; bottom: 0; display: flex; z-index: 1; }
    .swipe-btn { width: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-size: 0.8rem; gap: 4px; }
    .swipe-btn.complete { background: var(--success); }
    .swipe-btn.delete { background: var(--danger); }
    .swipe-btn.pin { background: var(--warning); }
    
    .task-card h3 { font-size: 1rem; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: start; }
    .task-card .meta { font-size: 0.75rem; color: var(--muted); margin-top: 6px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .task-card .desc { font-size: 0.9rem; margin: 6px 0; color: var(--text); opacity: 0.9; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; color: #fff; font-weight: 600; }
    
    .due-badge, .file-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 6px; font-weight: 600; }
    .due-badge.overdue { background: #fee2e2; color: #991b1b; }
    .due-badge.today { background: #dcfce7; color: #166534; }
    .due-badge.future { background: #e0f2fe; color: #075985; }
    .file-badge { background: #f1f5f9; color: #475569; }
    
    .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--primary); color: #fff; border: none; border-radius: 50%; font-size: 28px; box-shadow: 0 4px 14px rgba(37,99,235,0.4); cursor: pointer; z-index: 40; }
    .fab:active { transform: scale(0.95); }
    
    .modal { position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: none; justify-content: center; align-items: flex-end; z-index: 100; }
    .modal.active { display: flex; }
    @media(min-width: 640px) { .modal { align-items: center; } }
    .modal-box { background: var(--card); width: 100%; max-width: 480px; max-height: 90vh; border-radius: 16px 16px 0 0; overflow-y: auto; padding: 16px; }
    @media(min-width: 640px) { .modal-box { border-radius: 14px; } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; }
    .close { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: var(--muted); }
    
    .form-grid { display: flex; flex-direction: column; gap: 12px; }
    .fg label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 4px; }
    .fg input, .fg textarea, .fg select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; background: var(--bg); color: var(--text); }
    .fg textarea { min-height: 80px; resize: vertical; }
    .tags-input { display: flex; gap: 6px; flex-wrap: wrap; }
    .tags-input input, .tags-input select { flex: 1; min-width: 100px; }
    .tag-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; background: var(--primary); color: #fff; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .tag-chip button { background: none; border: none; color: inherit; padding: 0; margin-left: 2px; cursor: pointer; font-size: 1rem; line-height: 1; }
    
    .file-list { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
    .file-item { background: #e0f2fe; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; color: #075985; display: flex; align-items: center; gap: 4px; }
    .file-item button { background: none; border: none; color: inherit; padding: 0; cursor: pointer; }
    
    #detailView { display: none; padding: 16px; }
    #detailView.active { display: block; }
    .detail-card { background: var(--card); padding: 16px; border-radius: var(--radius); box-shadow: var(--shadow); }
    .detail-card h1 { font-size: 1.2rem; margin-bottom: 8px; }
    .detail-card .desc { font-size: 1rem; margin: 10px 0; line-height: 1.6; white-space: pre-wrap; }
    .detail-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
    .detail-actions button { flex: 1; min-width: 100px; }
    
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty svg { width: 60px; height: 60px; margin-bottom: 12px; opacity: 0.6; }
    
    #installPrompt { 
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); 
      background: var(--card); padding: 10px 16px; border-radius: 10px; 
      box-shadow: var(--shadow); display: none; align-items: center; gap: 8px; 
      z-index: 60; border: 1px solid var(--border); font-size: 0.9rem;
    }
    #installPrompt.show { display: flex; }
    
    .hidden { display: none !important; }
    .pin-icon { color: var(--warning); margin-right: 4px; }
    [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select { background: #0f172a; border-color: #475569; }
    
    @media(max-width: 480px) {
      .search-bar { flex-direction: column; }
      .search-bar input, .search-bar select { width: 100%; }
    }
    
    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1e293b; color: #fff; padding: 10px 16px; border-radius: 8px;
      font-size: 0.9rem; opacity: 0; transition: all 0.3s; z-index: 200; pointer-events: none;
      max-width: 90%; text-align: center;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--danger); }
  </style>
</head>
<body>
  <div id="listView">
    <header>
      <div class="brand">Задачи <span>Lite</span></div>
      <div class="actions">
        <button class="btn btn-outline btn-sm" onclick="toggleTheme()" title="Тема">🌓</button>
        <button class="btn btn-outline btn-sm" onclick="exportData()" title="Экспорт">📥</button>
        <label class="btn btn-outline btn-sm" title="Импорт" style="cursor:pointer">
          📤<input type="file" accept=".json" onchange="importData(this)" style="display:none">
        </label>
      </div>
    </header>
    
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Поиск..." oninput="renderList()">
      <input type="date" id="searchDate" onchange="renderList()">
      <button class="btn btn-outline btn-sm" onclick="clearDateFilter()" title="Сбросить дату">✕ Дата</button>
      <div class="status-toggle">
        <button class="status-btn active" onclick="setStatusFilter('all')">Все</button>
        <button class="status-btn" onclick="setStatusFilter('active')">Активные</button>
        <button class="status-btn" onclick="setStatusFilter('completed')">✅</button>
      </div>
    </div>
    
    <ul id="taskList" class="task-list"></ul>
    <div id="emptyState" class="empty hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <p>Нет задач. Создайте первую!</p>
    </div>
    
    <button class="fab" id="addBtn" onclick="openModal()">+</button>
  </div>
  
  <div id="detailView">
    <button class="btn btn-outline btn-sm" onclick="showList()" style="margin-bottom: 12px">← Назад</button>
    <div id="detailContent" class="detail-card"></div>
  </div>
  
  <div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle">Новая задача</h2>
        <button class="close" onclick="closeModal()">&times;</button>
      </div>
      <form id="taskForm" class="form-grid">
        <input type="hidden" id="editId">
        <div class="fg">
          <label>Заголовок *</label>
          <input type="text" id="inputTitle" required placeholder="Например: Купить продукты">
        </div>
        <div class="fg">
          <label>Описание</label>
          <textarea id="inputText" placeholder="Детали, заметки..."></textarea>
        </div>
        <div class="fg">
          <label>Срок выполнения</label>
          <input type="datetime-local" id="inputDue" step="60">
          <small style="color:var(--muted);font-size:0.7rem">Напоминание за 15 мин до срока</small>
        </div>
        <div class="fg">
          <label>Файлы (макс. 5/день, до 200КБ)</label>
          <input type="file" id="inputFiles" multiple accept="image/*,.pdf,.doc,.docx,.txt">
          <small id="fileLimitInfo" style="color:var(--muted);font-size:0.7rem"></small>
          <div id="previewFiles" class="file-list"></div>
        </div>
        <div class="fg">
          <label>Теги</label>
          <div class="tags-input">
            <select id="inputTagSelect" onchange="addTagFromSelect()">
              <option value="">+ Добавить тег</option>
              <option value="срочно">🔴 Срочно</option>
              <option value="важно">🟡 Важно</option>
              <option value="личное">🟣 Личное</option>
              <option value="работа">🔵 Работа</option>
              <option value="идея">🟢 Идея</option>
              <option value="покупки">🩷 Покупки</option>
            </select>
            <input type="text" id="inputTagCustom" placeholder="Свой тег..." onkeypress="if(event.key==='Enter'){addCustomTag();return false}">
          </div>
          <div id="selectedTags" class="tags" style="margin-top: 8px"></div>
        </div>
        <div class="fg">
          <label style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="inputPin" style="width: 18px; height: 18px;">
            <span>📌 Закрепить (макс. 5)</span>
          </label>
        </div>
        <div class="fg">
          <label style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="inputNotify" style="width: 18px; height: 18px;" checked>
            <span>🔔 Уведомление в срок</span>
          </label>
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px;">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Отмена</button>
          <button type="submit" class="btn btn-primary">💾 Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <div id="installPrompt">
    <span>📱 Установить приложение?</span>
    <button class="btn btn-primary btn-sm" onclick="installPWA()">Установить</button>
    <button class="btn btn-outline btn-sm" onclick="this.parentElement.classList.remove('show')">✕</button>
  </div>
  
  <div id="toast"></div>

  <script>
    // === PWA & SW ===
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
    }
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; $('installPrompt').classList.add('show'); });
    async function installPWA() { if(!deferredPrompt)return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; $('installPrompt').classList.remove('show'); showToast('✅ Установлено'); }
    
    // === State ===
    const DB = 'tasks_v3', FILES = 'files_log', THEME = 'theme';
    let tasks = [], fileLog = { date: '', count: 0 }, editingId = null, currentTags = [], currentFiles = [], statusFilter = 'all';
    
    const $ = id => document.getElementById(id);
    const uid = () => (crypto?.randomUUID?.() || Date.now().toString(36)+Math.random().toString(36).slice(2));
    
    // === Init ===
    function init() {
      try {
        tasks = JSON.parse(localStorage.getItem(DB) || '[]');
        const fl = JSON.parse(localStorage.getItem(FILES) || '{}');
        fileLog = fl.date === new Date().toISOString().slice(0,10) ? fl : { date: new Date().toISOString().slice(0,10), count: 0 };
      } catch(e) { tasks=[]; fileLog={date:new Date().toISOString().slice(0,10),count:0}; }
      
      if(localStorage.getItem(THEME)==='dark') document.documentElement.dataset.theme='dark';
      
      renderList();
      checkDueTasks();
      setInterval(checkDueTasks, 5*60*1000);
      
      $('addBtn').onclick = () => openModal();
      $('taskForm').onsubmit = saveTask;
      $('inputFiles').onchange = handleFileSelect;
      document.onkeydown = e => { if(e.key==='Escape'){closeModal();showList();} };
      document.body.addEventListener('click', async () => { if(Notification?.permission==='default') await Notification.requestPermission(); }, {once:true});
    }

    // === File Handling ===
    function handleFileSelect(e) {
      const files = Array.from(e.target.files);
      const limit = 5 - fileLog.count;
      if(limit <= 0) { showToast('❌ Лимит файлов на день исчерпан', true); e.target.value=''; return; }
      
      currentFiles = [];
      let loaded = 0;
      files.slice(0, limit).forEach(f => {
        if(f.size > 200*1024) { showToast(`❌ ${f.name} > 200КБ`, true); return; }
        const r = new FileReader();
        r.onload = ev => { currentFiles.push({name:f.name, size:f.size, type:f.type, data:ev.target.result}); loaded++; if(loaded===Math.min(files.length,limit)) updateFilePreview(); };
        r.readAsDataURL(f);
      });
      $('fileLimitInfo').textContent = `Загружено: ${Math.min(files.length, limit)}/${limit} (осталось: ${Math.max(0, limit)})`;
    }
    
    function updateFilePreview() {
      $('previewFiles').innerHTML = currentFiles.map((f,i)=>`<span class="file-item">📎 ${f.name} <button type="button" onclick="removeFile(${i})">✕</button></span>`).join('');
    }
    window.removeFile = i => { currentFiles.splice(i,1); updateFilePreview(); };

    // === Save/Load ===
    function save() {
      try {
        localStorage.setItem(DB, JSON.stringify(tasks));
        localStorage.setItem(FILES, JSON.stringify(fileLog));
        return true;
      } catch(e) {
        if(e.name==='QuotaExceededError') showToast('❌ Хранилище переполнено. Удалите старые файлы/задачи', true);
        return false;
      }
    }

    // === Render ===
    function renderList() {
      const q = $('searchInput').value.toLowerCase();
      const d = $('searchDate').value;
      const t = $('searchTag')?.value || '';
      const now = new Date();
      
      let list = tasks.filter(task => {
        const mq = !q || task.title.toLowerCase().includes(q) || (task.text||'').toLowerCase().includes(q);
        const md = !d || (task.dueDate && new Date(task.dueDate).toISOString().startsWith(d));
        const mt = !t || task.tags.includes(t);
        const ms = statusFilter==='all' || (statusFilter==='active' && !task.completed) || (statusFilter==='completed' && task.completed);
        return mq && md && mt && ms;
      });

      list.sort((a,b) => {
        if(a.pinned && !b.pinned) return -1; if(!a.pinned && b.pinned) return 1;
        if(a.completed !== b.completed) return a.completed ? 1 : -1;
        return (b.dueDate ? new Date(b.dueDate).getTime() : Infinity) - (a.dueDate ? new Date(a.dueDate).getTime() : Infinity);
      });

      const ul = $('taskList'), empty = $('emptyState');
      ul.innerHTML = '';
      if(!list.length) { empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      list.forEach(task => {
        const wrap = document.createElement('div');
        wrap.className = 'swipe-wrap';
        wrap.innerHTML = `
          <div class="swipe-content ${task.completed?'completed':''}" data-id="${task.id}">
            <h3>${task.pinned?'<span class="pin-icon">📌</span>':''}${esc(task.title)}</h3>
            ${task.text?`<div class="desc">${esc(task.text).slice(0,100)}${task.text.length>100?'…':''}</div>`:''}
            <div class="tags">${task.tags.map(t=>`<span class="tag tag-${t}">${t}</span>`).join('')}</div>
            ${task.files?.length?`<div style="margin-top:4px">${task.files.map(f=>`<span class="file-badge">📎 ${f.name}</span>`).join(' ')}</div>`:''}
            <div class="meta">
              <span>${new Date(task.createdAt).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</span>
              ${task.dueDate?`<span class="due-badge ${new Date(task.dueDate)<now&&!task.completed?'overdue':new Date(task.dueDate).toDateString()===now.toDateString()?'today':'future'}">${new Date(task.dueDate)<now&&!task.completed?'❗ Просрочено':new Date(task.dueDate).toDateString()===now.toDateString()?'📅 Сегодня':new Date(task.dueDate).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</span>`:''}
              ${task.completed?'<span style="color:var(--success);font-weight:600">✅ Выполнено</span>':''}
            </div>
          </div>
          <div class="swipe-actions">
            <div class="swipe-btn pin" onclick="togglePin('${task.id}')">📌<br>Пин</div>
            <div class="swipe-btn complete" onclick="toggleComplete('${task.id}')">${task.completed?'↩️<br>Возвр.':'✅<br>Готово'}</div>
            <div class="swipe-btn delete" onclick="deleteTask('${task.id}')">🗑️<br>Удалить</div>
          </div>
        `;
        initSwipe(wrap);
        wrap.querySelector('.swipe-content').onclick = e => { if(!wrap.dataset.swiped) openDetail(task.id); };
        ul.appendChild(wrap);
      });
    }
    
    window.setStatusFilter = s => { statusFilter=s; document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('active')); document.querySelector(`.status-btn:nth-child(${s==='all'?1:s==='active'?2:3})`).classList.add('active'); renderList(); };
    window.clearDateFilter = () => { $('searchDate').value=''; renderList(); };

    // === Swipe ===
    function initSwipe(el) {
      let startX, startY, currentX, isOpen = false;
      const content = el.querySelector('.swipe-content');
      const actions = el.querySelector('.swipe-actions');
      const max = 120;
      
      const start = e => { startX = e.touches ? e.touches[0].clientX : e.clientX; startY = e.touches ? e.touches[0].clientY : e.clientY; el.dataset.swiped='0'; };
      const move = e => {
        if(!startX) return;
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        if(Math.abs(x-startX) < Math.abs(y-startY)) return; // vertical scroll
        currentX = Math.max(0, Math.min(max, startX - x));
        if(currentX > 0) content.style.transform = `translateX(-${currentX}px)`;
      };
      const end = () => {
        if(currentX > max/2) { content.style.transform = `translateX(-${max}px)`; isOpen = true; el.dataset.swiped='1'; }
        else { content.style.transform = ''; isOpen = false; }
        startX = currentX = 0;
        setTimeout(()=> delete el.dataset.swiped, 500);
      };
      
      el.addEventListener('touchstart', start, {passive:true});
      el.addEventListener('touchmove', move, {passive:true});
      el.addEventListener('touchend', end);
      el.addEventListener('mousedown', start);
      el.addEventListener('mousemove', move);
      el.addEventListener('mouseup', end);
      el.addEventListener('mouseleave', end);
    }

    // === Actions ===
    window.toggleComplete = id => { const t=tasks.find(x=>x.id===id); if(!t)return; t.completed=!t.completed; t.completedAt=t.completed?Date.now():null; save(); renderList(); showToast(t.completed?'✅ Выполнено':'↩️ Возвращено'); };
    window.togglePin = id => { const t=tasks.find(x=>x.id===id); if(!t)return; if(!t.pinned && tasks.filter(x=>x.pinned).length>=5) return showToast('❌ Макс. 5 закреплённых',true); t.pinned=!t.pinned; save(); renderList(); };
    window.deleteTask = id => { if(!confirm('Удалить задачу?'))return; tasks=tasks.filter(x=>x.id!==id); save(); renderList(); showToast('🗑️ Удалено'); };
    
    function openDetail(id) {
      const t=tasks.find(x=>x.id===id); if(!t)return;
      $('detailContent').innerHTML = `
        <h1>${esc(t.title)} ${t.completed?'✅':''}</h1>
        <div class="meta" style="margin-bottom:12px">
          <div>🕐 ${new Date(t.createdAt).toLocaleString('ru-RU')}</div>
          ${t.dueDate?`<div>📅 ${new Date(t.dueDate).toLocaleString('ru-RU')}</div>`:''}
        </div>
        <div class="tags" style="margin-bottom:12px">${t.tags.map(tag=>`<span class="tag tag-${tag}">${tag}</span>`).join('')}</div>
        ${t.text?`<div class="desc">${esc(t.text)}</div>`:''}
        ${t.files?.length?`<div class="file-list" style="margin:12px 0">${t.files.map(f=>`<a href="${f.data}" download="${f.name}" style="color:var(--primary)">${f.name}</a>`).join(' • ')}</div>`:''}
        <div class="detail-actions">
          <button class="btn ${t.completed?'btn-outline':'btn-primary'}" onclick="toggleComplete('${t.id}');openDetail('${t.id}');">${t.completed?'↩️ Возвратить':'✅ Выполнить'}</button>
          <button class="btn btn-outline" onclick="editTask('${t.id}')">✏️ Ред.</button>
          <button class="btn btn-danger" onclick="deleteTask('${t.id}')">🗑️</button>
        </div>
      `;
      $('listView').style.display='none'; $('detailView').classList.add('active');
    }
    window.showList = () => { $('listView').style.display='block'; $('detailView').classList.remove('active'); };
    window.editTask = id => { showList(); setTimeout(()=>openModal(id),100); };

    // === Modal ===
    window.openModal = (id=null) => {
      editingId=id; $('taskForm').reset(); currentTags=[]; currentFiles=[]; $('selectedTags').innerHTML=''; $('previewFiles').innerHTML='';
      if(id) {
        const t=tasks.find(x=>x.id===id); $('modalTitle').textContent='Редактирование';
        $('inputTitle').value=t.title; $('inputText').value=t.text||''; $('inputDue').value=t.dueDate?t.dueDate.slice(0,16):'';
        $('inputNotify').checked=t.notify!==false; currentTags=[...t.tags]; currentFiles=[...(t.files||[])]; $('inputPin').checked=t.pinned;
        renderSelectedTags(); updateFilePreview();
      } else {
        $('modalTitle').textContent='Новая задача';
        const p=tasks.filter(x=>x.pinned).length; $('inputPin').disabled=p>=5; $('inputPin').title=p>=5?'Макс. 5':'';
        const tm=new Date(); tm.setDate(tm.getDate()+1); tm.setHours(18,0); $('inputDue').value=tm.toISOString().slice(0,16);
        $('fileLimitInfo').textContent=`Доступно файлов сегодня: ${Math.max(0,5-fileLog.count)}`;
      }
      $('modal').classList.add('active'); setTimeout(()=>$('inputTitle').focus(),100);
    };
    window.closeModal = () => { $('modal').classList.remove('active'); editingId=null; };
    
    window.addTagFromSelect = () => { const v=$('inputTagSelect').value; if(v&&!currentTags.includes(v)){currentTags.push(v);renderSelectedTags();} $('inputTagSelect').value=''; };
    window.addCustomTag = () => { const v=$('inputTagCustom').value.trim().toLowerCase(); if(v&&!currentTags.includes(v)&&v.length<=20){currentTags.push(v);renderSelectedTags();$('inputTagCustom').value='';} };
    window.removeTag = t => { currentTags=currentTags.filter(x=>x!==t); renderSelectedTags(); };
    function renderSelectedTags() { $('selectedTags').innerHTML=currentTags.map(t=>`<span class="tag-chip tag-${t}">${t} <button type="button" onclick="removeTag('${t}')">×</button></span>`).join(''); }

    function saveTask(e) {
      e.preventDefault();
      const title=$('inputTitle').value.trim(), text=$('inputText').value.trim(), due=$('inputDue').value?new Date($('inputDue').value).toISOString():null;
      const notify=$('inputNotify').checked, pin=$('inputPin').checked;
      if(pin&&!editingId && tasks.filter(t=>t.pinned).length>=5) return showToast('❌ Макс. 5 закреплённых',true);
      
      const now=Date.now();
      const task={id:editingId||uid(), title, text, dueDate:due, notify, tags:[...currentTags], pinned:pin, files:[...currentFiles], completed:false, createdAt:editingId?tasks.find(t=>t.id===editingId)?.createdAt||now:now, updatedAt:now};
      
      if(editingId) { const idx=tasks.findIndex(t=>t.id===editingId); if(idx>-1) tasks[idx]={...tasks[idx],...task}; }
      else tasks.unshift(task);
      
      if(fileLog.count+currentFiles.filter(f=>!tasks.find(t=>t.id===task.id)?.files?.find(of=>of.name===f.name)).length <=5) {
        fileLog.count += currentFiles.length;
      }
      
      if(!save()) return;
      closeModal(); renderList(); showToast('✅ Сохранено');
    }

    // === Utils ===
    function esc(s){return (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
    window.toggleTheme = () => { const d=document.documentElement.dataset.theme==='dark'; document.documentElement.dataset.theme=d?'':'dark'; localStorage.setItem(THEME,d?'light':'dark'); };
    window.exportData = () => { const b=new Blob([JSON.stringify({tasks,fileLog},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`tasks_${new Date().toISOString().slice(0,10)}.json`; a.click(); showToast('📥 Экспорт'); };
    window.importData = inp => { const f=inp.files[0]; if(!f)return; const r=new FileReader(); r.onload=e=>{ try{const d=JSON.parse(e.target.result); if(d.tasks){tasks=d.tasks;fileLog=d.fileLog||{date:new Date().toISOString().slice(0,10),count:0};save();renderList();showToast('✅ Импорт');}}catch(err){showToast('❌ Ошибка',true)} inp.value=''; }; r.readAsText(f); };
    function checkDueTasks(){const now=Date.now();tasks.forEach(t=>{if(!t.dueDate||t.completed||t.notified)return;const due=new Date(t.dueDate).getTime();if(due<now&&t.notify){showToast('❗ Просрочено: '+t.title);t.notified=true;save();}else if(due-now<=15*60000&&!t.reminded&&t.notify){showToast('⏰ Скоро: '+t.title);t.reminded=true;save();}});}

    init();
  </script>
</body>
</html>
