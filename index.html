<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Задачи • Lite</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Задачи">
  <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/svg?seed=tasks&backgroundColor=2563eb">
  <style>
    :root {
      --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b;
      --primary: #2563eb; --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
      --border: #e2e8f0; --radius: 12px; --shadow: 0 2px 10px rgba(0,0,0,0.06);
      --font: system-ui, -apple-system, sans-serif;
    }
    [data-theme="dark"] {
      --bg: #0b1120; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
      --border: #334155; --shadow: 0 2px 10px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.5; padding-bottom: 80px; }
    
    /* Header */
    header { position: sticky; top: 0; z-index: 50; background: var(--card); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .brand { font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
    .brand span { font-size: 0.7rem; background: var(--primary); color: #fff; padding: 2px 6px; border-radius: 6px; }
    .actions { display: flex; gap: 6px; }
    
    /* Buttons */
    .btn { padding: 8px 12px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; min-height: 36px; transition: transform 0.1s; }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 6px 10px; font-size: 0.85rem; min-height: 32px; }
    .btn-icon { width: 36px; height: 36px; padding: 0; justify-content: center; }
    
    /* Search */
    .search-bar { padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
    .search-bar input, .search-bar select { flex: 1; min-width: 120px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: var(--bg); color: var(--text); }
    
    /* Task List */
    .task-list { list-style: none; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .task-card { background: var(--card); padding: 14px; border-radius: var(--radius); box-shadow: var(--shadow); cursor: pointer; border-left: 4px solid var(--primary); transition: background 0.15s; position: relative; }
    .task-card:active { background: rgba(37,99,235,0.06); }
    .task-card.pinned { border-left-color: var(--warning); }
    .task-card.overdue { border-left-color: var(--danger); }
    .task-card.due-today { border-left-color: var(--success); }
    
    .task-card h3 { font-size: 1rem; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: start; }
    .task-card .meta { font-size: 0.75rem; color: var(--muted); margin-top: 6px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .task-card .desc { font-size: 0.9rem; margin: 6px 0; color: var(--text); opacity: 0.9; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; color: #fff; font-weight: 600; }
    .tag-срочно { background: #ef4444; } .tag-важно { background: #f59e0b; }
    .tag-личное { background: #8b5cf6; } .tag-работа { background: #06b6d4; }
    .tag-идея { background: #10b981; } .tag-покупки { background: #ec4899; }
    
    .due-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 6px; font-weight: 600; }
    .due-badge.overdue { background: #fee2e2; color: #991b1b; }
    .due-badge.today { background: #dcfce7; color: #166534; }
    .due-badge.future { background: #e0f2fe; color: #075985; }
    
    /* FAB */
    .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--primary); color: #fff; border: none; border-radius: 50%; font-size: 28px; box-shadow: 0 4px 14px rgba(37,99,235,0.4); cursor: pointer; z-index: 40; }
    .fab:active { transform: scale(0.95); }
    
    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: none; justify-content: center; align-items: flex-end; z-index: 100; }
    .modal.active { display: flex; }
    @media(min-width: 640px) { .modal { align-items: center; } }
    .modal-box { background: var(--card); width: 100%; max-width: 480px; max-height: 90vh; border-radius: 16px 16px 0 0; overflow-y: auto; padding: 16px; }
    @media(min-width: 640px) { .modal-box { border-radius: 14px; } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; }
    .close { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: var(--muted); }
    
    /* Form */
    .form-grid { display: flex; flex-direction: column; gap: 12px; }
    .fg label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 4px; }
    .fg input, .fg textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; background: var(--bg); color: var(--text); }
    .fg textarea { min-height: 80px; resize: vertical; }
    .tags-input { display: flex; gap: 6px; flex-wrap: wrap; }
    .tags-input input, .tags-input select { flex: 1; min-width: 100px; }
    .tag-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; background: var(--primary); color: #fff; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .tag-chip button { background: none; border: none; color: inherit; padding: 0; margin-left: 2px; cursor: pointer; font-size: 1rem; line-height: 1; }
    
    /* Detail View */
    #detailView { display: none; padding: 16px; }
    #detailView.active { display: block; }
    .detail-card { background: var(--card); padding: 16px; border-radius: var(--radius); box-shadow: var(--shadow); }
    .detail-card h1 { font-size: 1.2rem; margin-bottom: 8px; }
    .detail-card .desc { font-size: 1rem; margin: 10px 0; line-height: 1.6; white-space: pre-wrap; }
    .detail-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
    .detail-actions button { flex: 1; min-width: 100px; }
    
    /* Empty State */
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty svg { width: 60px; height: 60px; margin-bottom: 12px; opacity: 0.6; }
    
    /* Install Prompt */
    #installPrompt { 
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); 
      background: var(--card); padding: 10px 16px; border-radius: 10px; 
      box-shadow: var(--shadow); display: none; align-items: center; gap: 8px; 
      z-index: 60; border: 1px solid var(--border); font-size: 0.9rem;
    }
    #installPrompt.show { display: flex; }
    
    /* Utilities */
    .hidden { display: none !important; }
    .pin-icon { color: var(--warning); margin-right: 4px; }
    [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select { background: #0f172a; border-color: #475569; }
    
    @media(max-width: 480px) {
      .search-bar { flex-direction: column; }
      .search-bar input, .search-bar select { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- List View -->
  <div id="listView">
    <header>
      <div class="brand">Задачи <span>Lite</span></div>
      <div class="actions">
        <button class="btn btn-outline btn-sm" onclick="toggleTheme()" title="Тема">🌓</button>
        <button class="btn btn-outline btn-sm" onclick="exportData()" title="Экспорт">📥</button>
      </div>
    </header>
    
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Поиск..." oninput="renderList()">
      <input type="date" id="searchDate" onchange="renderList()">
      <select id="searchTag" onchange="renderList()">
        <option value="">Все теги</option>
        <option value="срочно">🔴 Срочно</option>
        <option value="важно">🟡 Важно</option>
        <option value="личное">🟣 Личное</option>
        <option value="работа">🔵 Работа</option>
        <option value="идея">🟢 Идея</option>
        <option value="покупки">🩷 Покупки</option>
      </select>
    </div>
    
    <ul id="taskList" class="task-list"></ul>
    <div id="emptyState" class="empty hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <p>Нет задач. Создайте первую!</p>
    </div>
    
    <button class="fab" id="addBtn" onclick="openModal()">+</button>
  </div>
  
  <!-- Detail View -->
  <div id="detailView">
    <button class="btn btn-outline btn-sm" onclick="showList()" style="margin-bottom: 12px">← Назад</button>
    <div id="detailContent" class="detail-card"></div>
  </div>
  
  <!-- Modal -->
  <div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle">Новая задача</h2>
        <button class="close" onclick="closeModal()">&times;</button>
      </div>
      <form id="taskForm" class="form-grid">
        <input type="hidden" id="editId">
        <div class="fg">
          <label>Заголовок *</label>
          <input type="text" id="inputTitle" required placeholder="Например: Купить продукты">
        </div>
        <div class="fg">
          <label>Описание</label>
          <textarea id="inputText" placeholder="Детали, заметки..."></textarea>
        </div>
        <div class="fg">
          <label>Срок выполнения</label>
          <input type="datetime-local" id="inputDue" step="60">
          <small style="color:var(--muted);font-size:0.7rem">Напоминание за 15 мин до срока</small>
        </div>
        <div class="fg">
          <label>Теги</label>
          <div class="tags-input">
            <select id="inputTagSelect" onchange="addTagFromSelect()">
              <option value="">+ Добавить тег</option>
              <option value="срочно">🔴 Срочно</option>
              <option value="важно">🟡 Важно</option>
              <option value="личное">🟣 Личное</option>
              <option value="работа">🔵 Работа</option>
              <option value="идея">🟢 Идея</option>
              <option value="покупки">🩷 Покупки</option>
            </select>
            <input type="text" id="inputTagCustom" placeholder="Свой тег..." onkeypress="if(event.key==='Enter'){addCustomTag();return false}">
          </div>
          <div id="selectedTags" class="tags" style="margin-top: 8px"></div>
        </div>
        <div class="fg">
          <label style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="inputPin" style="width: 18px; height: 18px;">
            <span>📌 Закрепить (макс. 5)</span>
          </label>
        </div>
        <div class="fg">
          <label style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="inputNotify" style="width: 18px; height: 18px;" checked>
            <span>🔔 Уведомление в срок</span>
          </label>
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px;">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Отмена</button>
          <button type="submit" class="btn btn-primary">💾 Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Install Prompt -->
  <div id="installPrompt">
    <span>📱 Установить приложение?</span>
    <button class="btn btn-primary btn-sm" onclick="installPWA()">Установить</button>
    <button class="btn btn-outline btn-sm" onclick="this.parentElement.classList.remove('show')">✕</button>
  </div>

  <script>
    // === PWA Registration ===
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => {
            console.log('SW registered', reg.scope);
            // Запрос разрешения на уведомления
            if ('Notification' in window && Notification.permission === 'default') {
              // Не запрашиваем сразу, ждём действия пользователя
            }
          })
          .catch(err => console.log('SW error', err));
      });
    }

    // === Install Prompt ===
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      $('installPrompt').classList.add('show');
    });
    
    async function installPWA() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const choice = await deferredPrompt.userChoice;
      if (choice.outcome === 'accepted') {
        console.log('PWA installed');
      }
      deferredPrompt = null;
      $('installPrompt').classList.remove('show');
    }
    
    window.addEventListener('appinstalled', () => {
      console.log('PWA installed');
      $('installPrompt').classList.remove('show');
    });

    // === Хранилище ===
    const DB_KEY = 'tasks_lite_v2';
    const NOTIF_KEY = 'tasks_notifs_v1';
    const uuid = () => (crypto.randomUUID?.() || Math.random().toString(36).substr(2, 9));
    
    let tasks = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
    let notifSchedule = JSON.parse(localStorage.getItem(NOTIF_KEY) || '{}');
    let editingId = null;
    let currentTags = [];
    
    // === DOM ===
    const $ = id => document.getElementById(id);
    
    // === Инициализация ===
    function init() {
      renderList();
      updateTagFilter();
      checkDueTasks(); // Проверка дедлайнов при запуске
      scheduleReminderChecks(); // Периодическая проверка
      
      // События
      $('addBtn').onclick = () => openModal();
      $('taskForm').onsubmit = saveTask;
      document.onkeydown = e => { if(e.key==='Escape'){ closeModal(); showList(); } };
      
      // Тема
      if(localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
      
      // Запрос прав на уведомления при первом действии
      document.body.addEventListener('click', requestNotifPermission, { once: true });
    }
    
    // === Уведомления: разрешение ===
    async function requestNotifPermission() {
      if ('Notification' in window && Notification.permission === 'default') {
        try {
          const perm = await Notification.requestPermission();
          console.log('Notification permission:', perm);
        } catch(e) { console.log('Notif error', e); }
      }
    }
    
    // === Уведомления: показать ===
    function showLocalNotification(title, body, tag, icon = null) {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, { body, tag, icon, requireInteraction: true });
      } else if ('serviceWorker' in navigator) {
        navigator.serviceWorker.ready.then(reg => {
          reg.showNotification(title, { body, tag, icon, requireInteraction: true });
        });
      }
    }
    
    // === Уведомления: планирование ===
    function scheduleTaskNotification(task) {
      if (!task.dueDate || !task.notify) return;
      const due = new Date(task.dueDate).getTime();
      const now = Date.now();
      const remindAt = due - 15 * 60 * 1000; // за 15 минут
      
      if (remindAt <= now) return; // уже прошло
      
      // Сохраняем в localStorage
      notifSchedule[task.id] = { due: task.dueDate, remindAt };
      localStorage.setItem(NOTIF_KEY, JSON.stringify(notifSchedule));
      
      // Планируем через setTimeout (работает пока вкладка открыта)
      const timeout = remindAt - now;
      setTimeout(() => {
        showLocalNotification('⏰ Напоминание', `Задача: ${task.title}`, `task-${task.id}`);
        // Удаляем из расписания после срабатывания
        delete notifSchedule[task.id];
        localStorage.setItem(NOTIF_KEY, JSON.stringify(notifSchedule));
      }, timeout);
      
      console.log(`🔔 Reminder scheduled for ${task.title} at ${new Date(remindAt).toLocaleString()}`);
    }
    
    // === Проверка дедлайнов (при запуске и периодически) ===
    function checkDueTasks() {
      const now = Date.now();
      tasks.forEach(t => {
        if (!t.dueDate || t.notified) return;
        const due = new Date(t.dueDate).getTime();
        
        // Если дедлайн прошёл
        if (due < now) {
          if (t.notify) {
            showLocalNotification('❗ Просрочено', `Задача "${t.title}" просрочена!`, `task-${t.id}`);
          }
          t.notified = true; // чтобы не спамить
          save();
        }
        // Если сейчас время напоминания (за 15 мин)
        else if (due - now <= 15 * 60 * 1000 && !t.reminded) {
          if (t.notify) {
            showLocalNotification('⏰ Скоро дедлайн', `Задача: ${t.title}`, `task-${t.id}`);
          }
          t.reminded = true;
          save();
        }
      });
    }
    
    function scheduleReminderChecks() {
      // Проверяем каждые 5 минут
      setInterval(checkDueTasks, 5 * 60 * 1000);
    }
    
    // === Рендер списка задач ===
    function renderList() {
      const query = $('searchInput').value.toLowerCase();
      const date = $('searchDate').value;
      const tag = $('searchTag').value;
      
      let filtered = tasks.filter(t => {
        const matchQuery = !query || t.title.toLowerCase().includes(query) || (t.text||'').toLowerCase().includes(query);
        const matchDate = !date || (t.dueDate && new Date(t.dueDate).toISOString().startsWith(date));
        const matchTag = !tag || t.tags.includes(tag);
        return matchQuery && matchDate && matchTag;
      });
      
      // Сортировка: закреплённые → просроченные → сегодня → остальные
      filtered.sort((a, b) => {
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        
        const now = new Date();
        const aDue = a.dueDate ? new Date(a.dueDate) : null;
        const bDue = b.dueDate ? new Date(b.dueDate) : null;
        
        const aOverdue = aDue && aDue < now;
        const bOverdue = bDue && bDue < now;
        if (aOverdue && !bOverdue) return -1;
        if (!aOverdue && bOverdue) return 1;
        
        const aToday = aDue && aDue.toDateString() === now.toDateString();
        const bToday = bDue && bDue.toDateString() === now.toDateString();
        if (aToday && !bToday) return -1;
        if (!aToday && bToday) return 1;
        
        return (bDue || Infinity) - (aDue || Infinity);
      });
      
      const list = $('taskList');
      const empty = $('emptyState');
      
      if (!filtered.length) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      
      const now = new Date();
      
      list.innerHTML = filtered.map(t => {
        const pin = t.pinned ? '<span class="pin-icon">📌</span>' : '';
        const tagsHtml = t.tags.map(tag => `<span class="tag tag-${tag}">${getTagName(tag)}</span>`).join('');
        
        // Бейдж дедлайна
        let dueBadge = '';
        if (t.dueDate) {
          const due = new Date(t.dueDate);
          const isOverdue = due < now && !t.notified;
          const isToday = due.toDateString() === now.toDateString();
          const dueStr = due.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
          const cls = isOverdue ? 'overdue' : (isToday ? 'today' : 'future');
          const label = isOverdue ? '❗ Просрочено' : (isToday ? '📅 Сегодня' : dueStr);
          dueBadge = `<span class="due-badge ${cls}">${label}</span>`;
        }
        
        const dateStr = new Date(t.createdAt).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        return `
          <li class="task-card ${t.pinned ? 'pinned' : ''} ${t.dueDate && new Date(t.dueDate) < now && !t.notified ? 'overdue' : ''} ${t.dueDate && new Date(t.dueDate).toDateString() === now.toDateString() ? 'due-today' : ''}" onclick="openDetail('${t.id}')">
            <h3>${pin}${escHtml(t.title)}</h3>
            ${t.text ? `<div class="desc">${escHtml(t.text).slice(0, 100)}${t.text.length>100?'…':''}</div>` : ''}
            <div class="tags">${tagsHtml}</div>
            <div class="meta">
              <span>${dateStr}</span>
              ${dueBadge}
              ${t.tags.length ? `<span>• ${t.tags.length} тег${t.tags.length===1?'':'а'}</span>` : ''}
            </div>
          </li>
        `;
      }).join('');
    }
    
    // === Детальный просмотр ===
    function openDetail(id) {
      const t = tasks.find(x => x.id === id);
      if (!t) return;
      
      const tagsHtml = t.tags.map(tag => `<span class="tag tag-${tag}">${getTagName(tag)}</span>`).join('');
      const dateStr = new Date(t.createdAt).toLocaleDateString('ru-RU', { 
        day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' 
      });
      const dueStr = t.dueDate ? new Date(t.dueDate).toLocaleString('ru-RU') : 'Не указан';
      const isOverdue = t.dueDate && new Date(t.dueDate) < new Date() && !t.notified;
      
      $('detailContent').innerHTML = `
        <h1>${escHtml(t.title)}</h1>
        <div class="meta" style="margin-bottom: 12px">
          <div>🕐 Создано: ${dateStr}</div>
          <div>📅 Срок: <strong style="color:${isOverdue?'var(--danger)':'inherit'}">${dueStr}</strong>${isOverdue?' <span style="color:var(--danger);font-weight:600">⚠️ Просрочено</span>':''}</div>
        </div>
        <div class="tags" style="margin-bottom: 12px">${tagsHtml || '<span style="color:var(--muted)">Без тегов</span>'}</div>
        <div class="desc">${t.text ? escHtml(t.text) : '<span style="color:var(--muted)">Без описания</span>'}</div>
        <div class="detail-actions">
          <button class="btn btn-outline" onclick="editTask('${t.id}')">✏️ Редактировать</button>
          <button class="btn btn-danger" onclick="deleteTask('${t.id}')">🗑️ Удалить</button>
          <button class="btn ${t.pinned?'btn-outline':'btn-primary'}" onclick="togglePin('${t.id}')">
            ${t.pinned?'📎 Открепить':'📌 Закрепить'}
          </button>
          ${t.dueDate ? `<button class="btn btn-outline" onclick="snoozeTask('${t.id}')">⏰ Отложить на 1ч</button>` : ''}
        </div>
      `;
      
      $('listView').style.display = 'none';
      $('detailView').classList.add('active');
    }
    
    function showList() {
      $('listView').style.display = 'block';
      $('detailView').classList.remove('active');
    }
    
    // === Отложить задачу ===
    function snoozeTask(id) {
      const t = tasks.find(x => x.id === id);
      if (!t || !t.dueDate) return;
      const oldDue = new Date(t.dueDate);
      const newDue = new Date(oldDue.getTime() + 60 * 60 * 1000); // +1 час
      t.dueDate = newDue.toISOString().slice(0, 16);
      t.notified = false;
      t.reminded = false;
      save();
      scheduleTaskNotification(t);
      openDetail(id);
      renderList();
      showLocalNotification('⏰ Отложено', `Задача "${t.title}" перенесена на ${newDue.toLocaleString('ru-RU', {hour:'2-digit',minute:'2-digit'})}`);
    }
    
    // === Модальное окно ===
    function openModal(id = null) {
      editingId = id;
      $('taskForm').reset();
      currentTags = [];
      $('selectedTags').innerHTML = '';
      
      if (id) {
        const t = tasks.find(x => x.id === id);
        $('modalTitle').textContent = 'Редактирование';
        $('inputTitle').value = t.title;
        $('inputText').value = t.text || '';
        $('inputDue').value = t.dueDate ? t.dueDate.slice(0,16) : '';
        $('inputNotify').checked = t.notify !== false;
        currentTags = [...t.tags];
        $('inputPin').checked = t.pinned;
        renderSelectedTags();
      } else {
        $('modalTitle').textContent = 'Новая задача';
        // Лимит пинов
        const pinnedCount = tasks.filter(t => t.pinned).length;
        $('inputPin').disabled = pinnedCount >= 5 && !editingId;
        if (pinnedCount >= 5 && !editingId) {
          $('inputPin').title = 'Максимум 5 закреплённых задач';
        }
        // Дефолтный дедлайн: завтра 18:00
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setHours(18, 0, 0, 0);
        $('inputDue').value = tomorrow.toISOString().slice(0, 16);
      }
      $('modal').classList.add('active');
      $('inputTitle').focus();
    }
    
    function closeModal() {
      $('modal').classList.remove('active');
      editingId = null;
    }
    
    // === Теги в модалке ===
    function addTagFromSelect() {
      const val = $('inputTagSelect').value;
      if (val && !currentTags.includes(val)) {
        currentTags.push(val);
        renderSelectedTags();
      }
      $('inputTagSelect').value = '';
    }
    
    function addCustomTag() {
      const val = $('inputTagCustom').value.trim().toLowerCase();
      if (val && !currentTags.includes(val) && val.length <= 20) {
        currentTags.push(val);
        renderSelectedTags();
        $('inputTagCustom').value = '';
      }
    }
    
    function removeTag(tag) {
      currentTags = currentTags.filter(t => t !== tag);
      renderSelectedTags();
    }
    
    function renderSelectedTags() {
      $('selectedTags').innerHTML = currentTags.map(tag => 
        `<span class="tag-chip tag-${tag}">${getTagName(tag)} <button type="button" onclick="removeTag('${tag}')">×</button></span>`
      ).join('');
    }
    
    function getTagName(key) {
      const names = {
        'срочно': 'Срочно', 'важно': 'Важно', 'личное': 'Личное',
        'работа': 'Работа', 'идея': 'Идея', 'покупки': 'Покупки'
      };
      return names[key] || key;
    }
    
    // === Сохранение задачи ===
    function saveTask(e) {
      e.preventDefault();
      
      const title = $('inputTitle').value.trim();
      const text = $('inputText').value.trim();
      const dueDate = $('inputDue').value ? new Date($('inputDue').value).toISOString() : null;
      const notify = $('inputNotify').checked;
      const pinned = $('inputPin').checked;
      
      // Проверка лимита пинов
      if (pinned && !editingId) {
        const pinnedCount = tasks.filter(t => t.pinned).length;
        if (pinnedCount >= 5) {
          alert('Максимум 5 закреплённых задач. Сначала открепите одну.');
          return;
        }
      }
      
      const now = Date.now();
      const task = {
        id: editingId || uuid(),
        title,
        text,
        dueDate,
        notify,
        tags: [...currentTags],
        pinned,
        createdAt: editingId ? tasks.find(t=>t.id===editingId)?.createdAt || now : now,
        updatedAt: now,
        notified: false,
        reminded: false
      };
      
      if (editingId) {
        tasks = tasks.map(t => t.id === editingId ? task : t);
      } else {
        tasks.unshift(task);
      }
      
      localStorage.setItem(DB_KEY, JSON.stringify(tasks));
      
      // Планируем уведомление
      if (dueDate && notify) {
        scheduleTaskNotification(task);
      }
      
      closeModal();
      renderList();
      updateTagFilter();
    }
    
    // === Действия с задачей ===
    function editTask(id) {
      showList();
      setTimeout(() => openModal(id), 100);
    }
    
    function deleteTask(id) {
      if (confirm('Удалить задачу?')) {
        tasks = tasks.filter(t => t.id !== id);
        // Удаляем из расписания уведомлений
        delete notifSchedule[id];
        localStorage.setItem(NOTIF_KEY, JSON.stringify(notifSchedule));
        localStorage.setItem(DB_KEY, JSON.stringify(tasks));
        showList();
        renderList();
      }
    }
    
    function togglePin(id) {
      const t = tasks.find(x => x.id === id);
      if (!t) return;
      
      if (!t.pinned) {
        const pinnedCount = tasks.filter(x => x.pinned).length;
        if (pinnedCount >= 5) {
          alert('Максимум 5 закреплённых задач');
          return;
        }
      }
      t.pinned = !t.pinned;
      t.updatedAt = Date.now();
      localStorage.setItem(DB_KEY, JSON.stringify(tasks));
      openDetail(id);
      renderList();
    }
    
    // === Утилиты ===
    function escHtml(str) {
      return (str || '').replace(/[&<>"']/g, m => 
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])
      );
    }
    
    function updateTagFilter() {
      const tags = new Set();
      tasks.forEach(t => t.tags.forEach(tag => tags.add(tag)));
      const sel = $('searchTag');
      const current = sel.value;
      sel.innerHTML = '<option value="">Все теги</option>' + 
        ['срочно','важно','личное','работа','идея','покупки', ...tags].filter((v,i,a)=>a.indexOf(v)===i)
        .map(tag => `<option value="${tag}">${getTagName(tag)}</option>`).join('');
      sel.value = current;
    }
    
    // === Тема ===
    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }
    
    // === Экспорт данных ===
    function exportData() {
      const data = { tasks, notifSchedule, exportedAt: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `tasks_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }
    
    // === Импорт данных ===
    function importData(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.tasks) {
            tasks = data.tasks;
            localStorage.setItem(DB_KEY, JSON.stringify(tasks));
          }
          if (data.notifSchedule) {
            notifSchedule = data.notifSchedule;
            localStorage.setItem(NOTIF_KEY, JSON.stringify(notifSchedule));
          }
          renderList();
          updateTagFilter();
          checkDueTasks();
          alert('✅ Данные импортированы');
        } catch(err) {
          alert('❌ Ошибка импорта: ' + err.message);
        }
        input.value = '';
      };
      reader.readAsText(file);
    }
    
    // === Запуск ===
    init();
  </script>
</body>
</html>
