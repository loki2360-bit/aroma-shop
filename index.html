<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Задачи • Lite</title>
  <style>
    :root {
      --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b;
      --primary: #2563eb; --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
      --border: #e2e8f0; --radius: 12px; --shadow: 0 2px 10px rgba(0,0,0,0.06);
      --font: system-ui, -apple-system, sans-serif;
    }
    [data-theme="dark"] {
      --bg: #0b1120; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.5; padding-bottom: 80px; }
    
    header { position: sticky; top: 0; z-index: 50; background: var(--card); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .brand { font-weight: 700; font-size: 1.1rem; }
    
    .btn { padding: 8px 12px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-sm { padding: 6px 10px; font-size: 0.85rem; }
    
    .search-bar { padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
    .search-bar input { flex: 1; min-width: 120px; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
    .status-toggle { display: flex; gap: 4px; }
    .status-btn { padding: 6px 8px; border: 1px solid var(--border); background: transparent; border-radius: 6px; font-size: 0.8rem; cursor: pointer; color: var(--muted); }
    .status-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    
    .task-list { list-style: none; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    
    .task-card { 
      background: var(--card); padding: 12px 14px; box-shadow: var(--shadow); 
      cursor: pointer; border-left: 4px solid var(--primary); border-radius: var(--radius);
      display: flex; flex-direction: column; gap: 8px;
    }
    .task-card:active { transform: scale(0.98); background: rgba(37,99,235,0.05); }
    .task-card.completed { opacity: 0.6; border-left-color: var(--muted); }
    .task-card.completed h3 { text-decoration: line-through; }
    .task-card.pinned { border-left-color: var(--warning); }
    
    .task-header { display: flex; justify-content: space-between; align-items: start; }
    .task-title-wrap { flex: 1; min-width: 0; overflow: hidden; }
    .task-card h3 { font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; }
    
    .indicator { font-size: 0.7rem; padding: 2px 5px; border-radius: 4px; font-weight: 600; background: #e0f2fe; color: #075985; }
    
    .task-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .mini-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; color: #fff; }
    
    #detailView { display: none; padding: 16px; }
    #detailView.active { display: block; }
    
    .detail-card { background: var(--card); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
    .detail-card h1 { font-size: 1.3rem; margin-bottom: 12px; }
    .detail-meta { display: flex; gap: 16px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); font-size: 0.85rem; color: var(--muted); }
    .detail-card .desc { font-size: 1rem; margin: 16px 0; line-height: 1.6; white-space: pre-wrap; background: var(--bg); padding: 12px; border-radius: 8px; }
    
    .subtasks-section { margin: 20px 0; }
    .subtasks-header { font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; }
    .subtask-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .subtask-input-row input { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); }
    .subtask-list { display: flex; flex-direction: column; gap: 6px; }
    .subtask-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--bg); border-radius: 8px; }
    .subtask-item.done { opacity: 0.5; }
    .subtask-item.done span { text-decoration: line-through; }
    .subtask-checkbox { width: 18px; height: 18px; accent-color: var(--success); }
    .subtask-text { flex: 1; font-size: 0.95rem; }
    .subtask-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; }
    
    .detail-card .tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
    .tag { font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; color: #fff; }
    
    .file-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin: 16px 0; }
    .file-item-img img { width: 100%; border-radius: 8px; }
    
    .detail-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 24px; }
    
    .empty, .loading { text-align: center; padding: 40px 20px; color: var(--muted); }
    
    #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 0.9rem; opacity: 0; transition: opacity 0.3s; z-index: 200; pointer-events: none; }
    #toast.show { opacity: 1; }
    #toast.error { background: var(--danger); }
    
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: flex-end; z-index: 100; }
    .modal.active { display: flex; }
    @media(min-width: 640px) { .modal { align-items: center; } }
    .modal-box { background: var(--card); width: 100%; max-width: 480px; max-height: 90vh; border-radius: 16px 16px 0 0; overflow-y: auto; padding: 16px; }
    @media(min-width: 640px) { .modal-box { border-radius: 14px; } }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .close { background: none; border: none; font-size: 1.8rem; cursor: pointer; }
    
    .form-grid { display: flex; flex-direction: column; gap: 12px; }
    .fg label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 4px; }
    .fg input, .fg textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); }
    .fg textarea { min-height: 80px; }
    .tags-input { display: flex; gap: 6px; }
    .tags-input input, .tags-input select { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); }
    
    .tag-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 20px; font-size: 0.75rem; color: #fff; margin: 2px; }
    .tag-chip button { background: none; border: none; color: inherit; cursor: pointer; }
    .color-palette { display: flex; gap: 6px; margin: 6px 0; }
    .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .color-dot.selected { border-color: var(--text); }
    
    .file-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .file-preview { position: relative; width: 60px; height: 60px; border-radius: 8px; overflow: hidden; }
    .file-preview img { width: 100%; height: 100%; object-fit: cover; }
    .file-preview button { position: absolute; top: 0; right: 0; background: var(--danger); color: #fff; border: none; width: 20px; height: 20px; cursor: pointer; }
    
    .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--primary); color: #fff; border: none; border-radius: 50%; font-size: 28px; cursor: pointer; }
    
    .hidden { display: none !important; }
    [data-theme="dark"] input, [data-theme="dark"] textarea { background: #0f172a; color: #f1f5f9; border-color: #475569; }
  </style>
</head>
<body>
  <div id="listView">
    <header>
      <div class="brand">Задачи Lite</div>
      <button class="btn btn-outline btn-sm" onclick="toggleTheme()">🌓</button>
    </header>
    
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Поиск..." oninput="renderList()">
      <div class="status-toggle">
        <button class="status-btn active" onclick="setStatusFilter('all')">Все</button>
        <button class="status-btn" onclick="setStatusFilter('active')">Активные</button>
        <button class="status-btn" onclick="setStatusFilter('completed')">✅</button>
      </div>
    </div>
    
    <ul id="taskList" class="task-list"></ul>
    <div id="emptyState" class="empty hidden"><p>Нет задач</p></div>
    <button class="fab" onclick="openModal()">+</button>
  </div>
  
  <div id="detailView">
    <button class="btn btn-outline btn-sm" onclick="showList()" style="margin-bottom:12px">← Назад</button>
    <div id="detailContent" class="detail-card"></div>
  </div>
  
  <div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-header"><h2 id="modalTitle">Задача</h2><button class="close" onclick="closeModal()">&times;</button></div>
      <form id="taskForm" class="form-grid">
        <input type="hidden" id="editId">
        <div class="fg"><label>Заголовок</label><input type="text" id="inputTitle" required></div>
        <div class="fg"><label>Описание</label><textarea id="inputText"></textarea></div>
        <div class="fg"><label>Фото</label><input type="file" id="inputFiles" multiple accept="image/*"><div id="previewFiles" class="file-list"></div></div>
        <div class="fg">
          <label>Теги</label>
          <div class="color-palette" id="colorPalette"></div>
          <div class="tags-input">
            <select id="inputTagSelect" onchange="addTagFromSelect()"><option value="">+ Тег</option><option value="срочно">🔴 Срочно</option><option value="важно">🟡 Важно</option><option value="работа">🔵 Работа</option><option value="личное">🟣 Личное</option></select>
            <input type="text" id="inputTagCustom" placeholder="Свой..." onkeypress="if(event.key==='Enter'){addCustomTag();return false}">
          </div>
          <div id="selectedTags"></div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end"><button type="button" class="btn btn-outline" onclick="closeModal()">Отмена</button><button type="submit" class="btn btn-primary">💾</button></div>
      </form>
    </div>
  </div>
  
  <div id="toast"></div>

  <script>
    const DB_KEY = 'tasks_lite_v1';
    let tasks = [], editingId = null, currentTags = [], currentFiles = [], statusFilter = 'all', selectedColor = '#3b82f6';
    const PALETTE = ['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899'];
    const TAG_PRESETS = {'срочно':'#ef4444','важно':'#f59e0b','работа':'#3b82f6','личное':'#8b5cf6'};
    
    const $ = id => document.getElementById(id);
    const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
    const esc = s => (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    
    // === Load/Save ===
    function loadTasks() {
      try {
        const data = localStorage.getItem(DB_KEY);
        tasks = data ? JSON.parse(data) : [];
      } catch(e) { tasks = []; }
    }
    function saveTasks() {
      try { localStorage.setItem(DB_KEY, JSON.stringify(tasks)); } catch(e) { showToast('❌ Много данных', true); }
    }
    
    // === Init ===
    function init() {
      loadTasks();
      renderColorPalette();
      renderList();
      
      $('taskForm').onsubmit = saveTask;
      $('inputFiles').onchange = handleFiles;
      document.onkeydown = e => { if(e.key==='Escape'){closeModal();showList();} };
    }
    
    // === Render ===
    function renderList() {
      const q = $('searchInput').value.toLowerCase();
      let list = tasks.filter(t => {
        const mq = !q || t.title.toLowerCase().includes(q);
        const ms = statusFilter==='all' || (statusFilter==='active'&&!t.completed) || (statusFilter==='completed'&&t.completed);
        return mq && ms;
      }).sort((a,b) => (a.pinned&&!b.pinned)?-1:((!a.pinned&&b.pinned)?1:(b.createdAt-a.createdAt)));
      
      $('taskList').innerHTML = '';
      if(!list.length) { $('emptyState').classList.remove('hidden'); return; }
      $('emptyState').classList.add('hidden');
      
      list.forEach(t => {
        const done = t.subtasks?.filter(s=>s.completed).length||0;
        const total = t.subtasks?.length||0;
        const card = document.createElement('div');
        card.className = `task-card ${t.completed?'completed':''} ${t.pinned?'pinned':''}`;
        card.onclick = () => openDetail(t.id);
        card.innerHTML = `
          <div class="task-header">
            <div class="task-title-wrap">${t.pinned?'📌 ':''}<h3>${esc(t.title)}</h3></div>
            ${total>0?`<span class="indicator">✅${done}/${total}</span>`:''}
          </div>
          <div class="task-tags">${(t.tags||[]).map(tag=>`<span class="mini-tag" style="background:${tag.color}">${esc(tag.name)}</span>`).join('')}</div>
        `;
        $('taskList').appendChild(card);
      });
    }
    
    window.setStatusFilter = s => {
      statusFilter = s;
      document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('active'));
      event.target.classList.add('active');
      renderList();
    };
    
    // === Detail ===
    function openDetail(id) {
      const t = tasks.find(x=>x.id===id);
      if(!t) return;
      
      let subsHtml = '';
      if(t.subtasks && t.subtasks.length) {
        subsHtml = `<div class="subtasks-section"><div class="subtasks-header">Подзадачи</div><div class="subtask-list">
          ${t.subtasks.map(s=>`<div class="subtask-item ${s.completed?'done':''}"><input type="checkbox" class="subtask-checkbox" ${s.completed?'checked':''} onchange="toggleSubtask('${t.id}','${s.id}')"><span class="subtask-text">${esc(s.text)}</span><button class="subtask-del" onclick="deleteSubtask('${t.id}','${s.id}')">×</button></div>`).join('')}
        </div></div>
        <div class="subtask-input-row"><input type="text" id="subInput" placeholder="Подзадача..." onkeypress="if(event.key==='Enter')addSubtask('${t.id}')"><button class="btn btn-sm btn-primary" onclick="addSubtask('${t.id}')">+</button></div>`;
      }
      
      $('detailContent').innerHTML = `
        <h1>${esc(t.title)}</h1>
        <div class="detail-meta"><div>🕐 ${new Date(t.createdAt).toLocaleDateString()}</div></div>
        <div class="tags">${(t.tags||[]).map(tag=>`<span class="tag" style="background:${tag.color}">${esc(tag.name)}</span>`).join('')}</div>
        ${t.text?`<div class="desc">${esc(t.text)}</div>`:''}
        ${subsHtml}
        <div class="detail-actions">
          <button class="btn ${t.completed?'btn-outline':'btn-success'}" onclick="toggleComplete('${t.id}')">${t.completed?'↩️':'✅'}</button>
          <button class="btn btn-outline" onclick="editTask('${t.id}')">✏️</button>
          <button class="btn btn-danger" onclick="deleteTask('${t.id}')">🗑️</button>
        </div>
      `;
      $('listView').style.display = 'none';
      $('detailView').classList.add('active');
    }
    
    window.showList = () => { $('listView').style.display='block'; $('detailView').classList.remove('active'); };
    
    // === Subtasks ===
    window.toggleSubtask = (tid, sid) => {
      const t = tasks.find(x=>x.id===tid);
      const s = t.subtasks.find(x=>x.id===sid);
      s.completed = !s.completed;
      saveTasks();
      openDetail(tid);
      renderList();
    };
    
    window.addSubtask = (tid) => {
      const input = $('subInput');
      const text = input.value.trim();
      if(!text) return;
      const t = tasks.find(x=>x.id===tid);
      if(!t.subtasks) t.subtasks = [];
      t.subtasks.push({id:uid(), text, completed:false});
      saveTasks();
      openDetail(tid);
      renderList();
    };
    
    window.deleteSubtask = (tid, sid) => {
      const t = tasks.find(x=>x.id===tid);
      t.subtasks = t.subtasks.filter(s=>s.id!==sid);
      saveTasks();
      openDetail(tid);
      renderList();
    };
    
    // === Actions ===
    window.toggleComplete = id => {
      const t = tasks.find(x=>x.id===id);
      t.completed = !t.completed;
      saveTasks();
      renderList();
      if(!$('detailView').classList.contains('active')) openDetail(id);
    };
    
    window.editTask = id => { showList(); setTimeout(()=>openModal(id), 100); };
    
    window.deleteTask = id => {
      if(!confirm('Удалить?')) return;
      tasks = tasks.filter(x=>x.id!==id);
      saveTasks();
      renderList();
      showList();
    };
    
    // === Modal ===
    window.openModal = (id=null) => {
      editingId = id;
      currentTags = [];
      currentFiles = [];
      $('taskForm').reset();
      $('selectedTags').innerHTML = '';
      $('previewFiles').innerHTML = '';
      renderColorPalette();
      
      if(id) {
        const t = tasks.find(x=>x.id===id);
        $('modalTitle').textContent = 'Редактирование';
        $('inputTitle').value = t.title;
        $('inputText').value = t.text || '';
        currentTags = [...(t.tags||[])];
        currentFiles = [...(t.files||[])];
        renderSelectedTags();
        updateFilePreview();
      } else {
        $('modalTitle').textContent = 'Новая задача';
      }
      $('modal').classList.add('active');
    };
    
    window.closeModal = () => { $('modal').classList.remove('active'); editingId = null; };
    
    function renderColorPalette() {
      $('colorPalette').innerHTML = PALETTE.map(c => `<div class="color-dot ${c===selectedColor?'selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');
    }
    window.selectColor = c => { selectedColor = c; renderColorPalette(); };
    
    window.addTagFromSelect = () => {
      const name = $('inputTagSelect').value;
      if(!name || currentTags.some(t=>t.name===name)) return;
      currentTags.push({name, color: TAG_PRESETS[name]||selectedColor});
      renderSelectedTags();
      $('inputTagSelect').value = '';
    };
    
    window.addCustomTag = () => {
      const name = $('inputTagCustom').value.trim().toLowerCase();
      if(!name || currentTags.some(t=>t.name===name)) return;
      currentTags.push({name, color: selectedColor});
      renderSelectedTags();
      $('inputTagCustom').value = '';
    };
    
    window.removeTag = i => { currentTags.splice(i,1); renderSelectedTags(); };
    
    function renderSelectedTags() {
      $('selectedTags').innerHTML = currentTags.map((t,i)=>`<span class="tag-chip" style="background:${t.color}">${t.name} <button onclick="removeTag(${i})">×</button></span>`).join('');
    }
    
    // === Files ===
    function handleFiles(e) {
      currentFiles = [];
      Array.from(e.target.files).slice(0,5).forEach(f => {
        if(!f.type.startsWith('image/')) return;
        const r = new FileReader();
        r.onload = ev => {
          currentFiles.push({name:f.name, data:ev.target.result});
          updateFilePreview();
        };
        r.readAsDataURL(f);
      });
    }
    
    function updateFilePreview() {
      $('previewFiles').innerHTML = currentFiles.map((f,i)=>`<div class="file-preview"><img src="${f.data}"><button type="button" onclick="removeFile(${i})">×</button></div>`).join('');
    }
    window.removeFile = i => { currentFiles.splice(i,1); updateFilePreview(); };
    
    // === Save ===
    function saveTask(e) {
      e.preventDefault();
      const title = $('inputTitle').value.trim();
      const text = $('inputText').value.trim();
      
      const task = {
        id: editingId || uid(),
        title, text,
        tags: [...currentTags],
        files: [...currentFiles],
        subtasks: editingId ? tasks.find(t=>t.id===editingId)?.subtasks || [] : [],
        completed: false,
        pinned: false,
        createdAt: editingId ? tasks.find(t=>t.id===editingId)?.createdAt || Date.now() : Date.now()
      };
      
      if(editingId) {
        const idx = tasks.findIndex(t=>t.id===editingId);
        tasks[idx] = task;
      } else {
        tasks.unshift(task);
      }
      
      saveTasks();
      closeModal();
      renderList();
      showToast('✅');
    }
    
    // === Utils ===
    window.toggleTheme = () => {
      const d = document.documentElement.dataset.theme === 'dark';
      document.documentElement.dataset.theme = d ? '' : 'dark';
    };
    
    function showToast(msg, isError=false) {
      const t = $('toast');
      t.textContent = msg;
      t.className = (isError?'error ':'') + 'show';
      setTimeout(()=>t.classList.remove('show'), 2000);
    }
    
    // Start
    init();
  </script>
</body>
</html>
